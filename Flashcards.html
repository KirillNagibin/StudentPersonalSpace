<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Физика | Карточки</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Подключение MathJax для формул LaTeX -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' },
            startup: { typeset: false } // Отключаем авто-рендер при старте, будем вызывать вручную
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <style>
        :root {
            /* Палитра из личного кабинета */
            --bg-main: #121212;
            --bg-sidebar: #191919;
            --bg-card: #1e1e1e;
            --bg-hover: rgba(255, 255, 255, 0.05);
            --border: #333333;
            --accent: #4CAF50;
            --accent-hover: #45a049;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Утилитные классы для скрытия/показа экранов */
        .view-hidden { display: none !important; }
        .view-active { display: flex; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 3D Сцена для карточки */
        .scene {
            width: 100%;
            height: 50vh; /* Адаптивная высота */
            min-height: 250px;
            max-height: 450px;
            perspective: 1200px;
            margin: 0 auto;
        }

        /* Сама карточка (контейнер граней) */
        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        /* Общие стили для обеих граней */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            font-size: 1.15rem;
            line-height: 1.6;
            overflow-y: auto; /* На случай длинных формул */
        }

        .card-face-front {
            /* Лицевая сторона */
        }

        .card-face-back {
            /* Обратная сторона перевернута на 180 градусов изначально */
            transform: rotateY(180deg);
            border-color: var(--accent);
            background: linear-gradient(145deg, var(--bg-card) 0%, rgba(76, 175, 80, 0.05) 100%);
        }

        /* Стили кнопок (под стиль админки) */
        .menu-btn {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            transition: all 0.2s;
        }
        .menu-btn:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background-color: var(--bg-hover);
            transform: translateY(-2px);
        }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        
        /* Мобильные оптимизации */
        @media (max-width: 640px) {
            .scene { height: 55vh; }
            .card-face { font-size: 1.05rem; padding: 20px 16px; }
            .menu-btn { padding: 16px !important; h-auto; min-height: 100px; }
            h1 { font-size: 1.5rem !important; }
        }
    </style>
</head>
<body>

    <div id="view-menu" class="view-active flex-col h-full p-4 md:p-12 overflow-y-auto">
        <div class="max-w-4xl w-full mx-auto">
            <h1 class="text-2xl md:text-3xl font-bold mb-2 flex items-center gap-3">
                <i data-lucide="layers" class="text-green-500 w-7 h-7 md:w-8 md:h-8"></i>
                Тренировка по карточкам
            </h1>
            <p class="text-sm md:text-base text-gray-400 mb-8">Выберите тему для повторения или запустите глобальный микс.</p>

            <!-- Большая кнопка "Случайные: Вся физика" -->
            <button onclick="app.startPractice('all')" class="w-full relative overflow-hidden rounded-xl border border-green-500/30 bg-[#172417] p-6 md:p-8 mb-8 text-left transition-all hover:bg-[#1a2d1a] hover:border-green-500/50 group shadow-lg">
                <div class="absolute right-0 top-0 opacity-10 transform translate-x-4 -translate-y-4 group-hover:scale-110 transition-transform duration-500 pointer-events-none">
                    <i data-lucide="zap" class="w-32 h-32 md:w-48 md:h-48"></i>
                </div>
                <h2 class="text-xl md:text-2xl font-bold text-green-400 mb-2">Глобальный Микс</h2>
                <p class="text-xs md:text-sm text-gray-300 max-w-[80%]">Перемешать все доступные карточки из всех тем для комплексной проверки знаний.</p>
                <div class="mt-4 flex items-center gap-2 text-sm font-semibold text-green-500">
                    Начать тренировку <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </div>
            </button>

            <h3 class="text-lg md:text-xl font-semibold mb-4 border-b border-gray-800 pb-2">Доступные темы</h3>
            
            <!-- Сетка для кнопок тем будет сгенерирована динамически -->
            <div id="menu-topics-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 pb-8">
                <!-- Заглушка -->
                <div class="animate-pulse bg-[#1e1e1e] border border-[#333] h-28 rounded-xl"></div>
                <div class="animate-pulse bg-[#1e1e1e] border border-[#333] h-28 rounded-xl"></div>
            </div>
        </div>
    </div>

    <div id="view-practice" class="view-hidden flex-col h-full">
        <!-- Шапка -->
        <div class="flex items-center justify-between p-4 border-b border-gray-800 bg-[#121212] z-10 shadow-md">
            <button onclick="app.returnToMenu()" class="flex items-center gap-2 text-gray-400 hover:text-white transition-colors text-sm md:text-base font-medium py-2 px-3 -ml-3 rounded-lg hover:bg-white/5">
                <i data-lucide="chevron-left" class="w-5 h-5"></i> <span class="hidden md:inline">Назад в меню</span>
            </button>
            <div class="text-sm md:text-base font-semibold text-gray-300 text-center flex-1 px-4 truncate">
                <span id="current-topic-label">Тема</span>
            </div>
            <div class="text-xs md:text-sm font-medium text-gray-500 whitespace-nowrap">
                <span id="progress-counter">0 / 0</span>
            </div>
        </div>

        <!-- Центральная область с карточкой -->
        <div class="flex-1 flex flex-col items-center justify-center p-4 md:p-6 w-full max-w-4xl mx-auto relative">
            
            <div class="scene" id="flashcard-scene">
                <div class="flashcard" id="flashcard" onclick="app.flipCard()">
                    <div class="card-face card-face-front">
                        <span class="text-xs md:text-sm text-gray-500 font-semibold mb-4 uppercase tracking-wider">Вопрос</span>
                        <div id="card-question-text" class="text-lg md:text-2xl font-medium flex-1 flex items-center justify-center w-full">Загрузка...</div>
                        <div class="mt-4 text-xs md:text-sm text-gray-500 flex items-center gap-2 opacity-70">
                            <i data-lucide="mouse-pointer-click" class="w-4 h-4"></i> Нажмите, чтобы перевернуть
                        </div>
                    </div>
                    <div class="card-face card-face-back">
                        <span class="text-xs md:text-sm text-green-500 font-semibold mb-4 uppercase tracking-wider">Ответ</span>
                        <div id="card-answer-text" class="text-lg md:text-2xl font-medium text-white flex-1 flex items-center justify-center w-full">Загрузка...</div>
                    </div>
                </div>
            </div>

            <!-- Блок управления внизу -->
            <div class="mt-8 md:mt-12 w-full max-w-sm px-4">
                <button id="btn-next-card" onclick="app.nextCard()" class="w-full bg-[#1e1e1e] hover:bg-[#252525] text-white font-semibold py-4 px-6 rounded-xl border border-[#333] transition-all flex items-center justify-center gap-2 shadow-lg active:scale-95">
                    Следующая карточка <i data-lucide="arrow-right" class="w-5 h-5 text-green-500"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Обновленные Mock-данные с поддержкой MathJax/LaTeX
        const DEFAULT_DB = {
            "kinematics": {
                "title": "Кинематика",
                "cards": [
                    { "q": "Формула скорости при равноускоренном движении", "a": "$v = v_0 + at$" },
                    { "q": "Уравнение координаты при равноускоренном движении", "a": "$x = x_0 + v_0t + \\frac{at^2}{2}$" },
                    { "q": "Что показывает производная координаты по времени?", "a": "Мгновенную скорость: $v = x'(t)$" },
                    { "q": "Связь линейной и угловой скорости", "a": "$v = \\omega R$" }
                ]
            },
            "dynamics": {
                "title": "Динамика",
                "cards": [
                    { "q": "Сформулируйте Второй закон Ньютона", "a": "$$ \\vec{F} = m\\vec{a} $$ (Ускорение прямо пропорционально силе и обратно пропорционально массе)" },
                    { "q": "Формула силы трения скольжения", "a": "$F_{тр} = \\mu N$" },
                    { "q": "Закон всемирного тяготения", "a": "$F = G \\frac{m_1 m_2}{r^2}$" }
                ]
            },
            "thermodynamics": {
                "title": "МКТ и Термодинамика",
                "cards": [
                    { "q": "Основное уравнение МКТ", "a": "$p = \\frac{1}{3} m_0 n \\overline{v^2} = \\frac{2}{3} n \\overline{E_k}$" },
                    { "q": "Первое начало термодинамики", "a": "$Q = \\Delta U + A$<br><span class='text-sm text-gray-400 mt-2 block'>(Теплота идет на изменение внутр. энергии и работу газа)</span>" },
                    { "q": "Уравнение Менделеева-Клапейрона", "a": "$pV = \\frac{m}{M}RT = \\nu RT$" }
                ]
            }
        };

        const app = {
            database: DEFAULT_DB,  
            currentDeck: [],       
            currentIndex: 0,       
            isFlipped: false,      
            isTransitioning: false, // Блокировка от двойных кликов

            init() {
                this.renderMenu();
                // Слушатель сообщений из родительского окна (Личного кабинета)
                window.addEventListener('message', this.handleMessage.bind(this));
            },

            handleMessage(event) {
                if (event.data && event.data.type === 'LOAD_FLASHCARDS') {
                    if (event.data.data && Object.keys(event.data.data).length > 0) {
                        this.database = event.data.data;
                        this.renderMenu();
                    }
                }
            },

            renderMenu() {
                const grid = document.getElementById('menu-topics-grid');
                grid.innerHTML = ''; 

                const topics = Object.keys(this.database);

                if (topics.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-8">База карточек пуста.</div>';
                    return;
                }

                topics.forEach(key => {
                    const topic = this.database[key];
                    const cardCount = topic.cards ? topic.cards.length : 0;
                    
                    const btn = document.createElement('button');
                    btn.className = 'menu-btn w-full p-5 text-left flex flex-col justify-between group';
                    btn.onclick = () => this.startPractice(key);
                    
                    btn.innerHTML = `
                        <div class="font-semibold text-lg text-white group-hover:text-green-400 transition-colors line-clamp-2">${topic.title}</div>
                        <div class="text-sm text-gray-500 mt-3 flex items-center gap-2">
                            <i data-lucide="library" class="w-4 h-4"></i> ${cardCount} карточек
                        </div>
                    `;
                    grid.appendChild(btn);
                });

                lucide.createIcons({ root: grid });
            },

            shuffleArray(array) {
                const newArr = [...array];
                for (let i = newArr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
                }
                return newArr;
            },

            startPractice(topicKey) {
                this.currentDeck = [];
                let topicLabel = "";

                if (topicKey === 'all') {
                    topicLabel = "Глобальный Микс";
                    Object.values(this.database).forEach(topic => {
                        if (topic.cards && Array.isArray(topic.cards)) {
                            this.currentDeck.push(...topic.cards);
                        }
                    });
                } else {
                    const topic = this.database[topicKey];
                    if (topic) {
                        topicLabel = topic.title;
                        this.currentDeck = topic.cards ? [...topic.cards] : [];
                    }
                }

                if (this.currentDeck.length === 0) {
                    alert('В этой теме пока нет карточек!');
                    return;
                }

                this.currentDeck = this.shuffleArray(this.currentDeck);
                this.currentIndex = 0;
                this.isFlipped = false;
                this.isTransitioning = false;

                document.getElementById('current-topic-label').textContent = topicLabel;
                
                // Убираем класс переворота сразу, если он был
                document.getElementById('flashcard').classList.remove('is-flipped');
                
                this.updateCardUI();

                document.getElementById('view-menu').classList.replace('view-active', 'view-hidden');
                document.getElementById('view-practice').classList.replace('view-hidden', 'view-active');
            },

            returnToMenu() {
                const card = document.getElementById('flashcard');
                card.style.transition = 'none'; 
                card.classList.remove('is-flipped');
                this.isFlipped = false;
                
                setTimeout(() => { card.style.transition = ''; }, 50);

                document.getElementById('view-practice').classList.replace('view-active', 'view-hidden');
                document.getElementById('view-menu').classList.replace('view-hidden', 'view-active');
            },

            flipCard() {
                if (this.isTransitioning) return;
                this.isFlipped = !this.isFlipped;
                const card = document.getElementById('flashcard');
                
                if (this.isFlipped) {
                    card.classList.add('is-flipped');
                } else {
                    card.classList.remove('is-flipped');
                }
            },

            nextCard() {
                if (this.isTransitioning) return;
                this.isTransitioning = true;
                
                this.currentIndex++;
                
                if (this.currentIndex >= this.currentDeck.length) {
                    this.currentDeck = this.shuffleArray(this.currentDeck);
                    this.currentIndex = 0;
                }

                const card = document.getElementById('flashcard');
                
                if (this.isFlipped) {
                    this.isFlipped = false;
                    card.classList.remove('is-flipped');
                    
                    // Ждем пока карточка перевернется обратно
                    setTimeout(() => {
                        this.updateCardUI();
                        this.isTransitioning = false;
                    }, 400); 
                } else {
                    const frontFace = document.querySelector('.card-face-front');
                    frontFace.style.opacity = '0';
                    setTimeout(() => {
                        this.updateCardUI();
                        frontFace.style.opacity = '1';
                        this.isTransitioning = false;
                    }, 200);
                }
            },

            updateCardUI() {
                const currentCardData = this.currentDeck[this.currentIndex];
                
                const qElem = document.getElementById('card-question-text');
                const aElem = document.getElementById('card-answer-text');
                
                // Используем innerHTML для поддержки тегов форматирования (если есть)
                qElem.innerHTML = currentCardData.q;
                aElem.innerHTML = currentCardData.a;
                
                document.getElementById('progress-counter').textContent = `${this.currentIndex + 1} / ${this.currentDeck.length}`;

                // Вызов рендеринга формул MathJax
                if (window.MathJax && typeof MathJax.typesetPromise === 'function') {
                    MathJax.typesetPromise([qElem, aElem]).catch((err) => console.log('MathJax Error:', err));
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });

    </script>
</body>
</html>
